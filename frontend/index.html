<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mistral Chat</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="config.js"></script> <!-- Load CONFIG without API key -->
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: #fff;
  color: #000;
}

header { 
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
  padding: 15px; 
  border-bottom: 1px solid #ddd;
  background: #f9f9f9;
}

#chat { 
  flex: 1; 
  overflow-y: auto; 
  padding: 20px; 
  display: flex; 
  flex-direction: column; 
  gap: 10px; 
  background: #fff;
}

.message { 
  padding: 12px; 
  border-radius: 10px; 
  max-width: 90%; 
  white-space: pre-wrap; 
  position: relative;
}

.user { 
  background: #4a90e2; 
  color: white; 
  align-self: flex-end;
}

.ai { 
  background: #eee; 
  color: #000;
}

.message pre { 
  background: #111; 
  color: #fff; 
  padding: 10px; 
  border-radius: 6px; 
  overflow: auto; 
  position: relative;
}

.copy-btn { 
  position: absolute; 
  top: 5px; 
  right: 5px; 
  background: #555; 
  color: white; 
  border: none; 
  padding: 3px 6px; 
  border-radius: 4px; 
  font-size: 12px; 
  cursor: pointer; 
  opacity: 0.7;
}

.copy-btn:hover { opacity: 1; }

.message code { 
  background: #ddd; 
  padding: 3px 6px; 
  border-radius: 4px;
}

.message table { 
  border-collapse: collapse; 
  width: 100%; 
  margin-top: 10px;
}

.message th, .message td { 
  border: 1px solid #ccc; 
  padding: 6px; 
  text-align: left;
}

.input-area { 
  display: flex; 
  padding: 10px; 
  border-top: 1px solid #ddd; 
  gap: 5px; 
  flex-wrap: wrap; 
  align-items: center; 
  background: #f9f9f9;
}

input[type=text] { 
  flex: 1; 
  padding: 10px; 
  font-size: 16px; 
  border: 1px solid #ccc; 
  border-radius: 6px;
}

button, select { 
  padding: 10px; 
  cursor: pointer; 
  border-radius: 6px; 
  border: 1px solid #ccc; 
  background: #fff; 
  color: #000;
}

button:hover, select:hover { 
  opacity: 0.9;
}

body.dark { 
  background: #121212; 
  color: #e0e0e0;
}

body.dark header { 
  border-bottom: 1px solid #444; 
  background: #1a1a1a;
}

body.dark #chat { 
  background: #121212;
}

body.dark .ai { 
  background: #1e1e1e; 
  color: #e0e0e0;
}

body.dark .user { 
  background: #2962ff;
  color: #fff;
}

body.dark input[type=text], 
body.dark select, 
body.dark button { 
  background: #1a1a1a; 
  color: #e0e0e0; 
  border: 1px solid #555;
}

body.dark .message code { 
  background: #333; 
  color: #fff;
}

body.dark .message pre { 
  background: #222; 
  color: #fff;
}

body.dark .input-area { 
  background: #1a1a1a;
}

@media(max-width:600px) { 
  #chat { padding: 10px; } 
}
</style>
</head>
<body>

<header>
  <h2>Mistral Chat</h2>
  <div>
    <select id="modelSelect">
      <option value="mistral-small-latest">Mistral</option>
      <option value="devstral-latest">Devstral</option>
      <option value="mistral-large-2512">Mistral Large</option>
    </select>
    <button id="themeBtn">🌓</button>
    <button onclick="exportChat()">Export</button>
    <button onclick="clearChat()">Clear</button>
  </div>
</header>

<div id="chat"></div>

<div class="input-area">
  <input id="prompt" type="text" placeholder="Ask something...">
  <button id="attachBtn">Attach Files</button>
  <button onclick="sendMessage()">Send</button>
  <input type="file" id="fileInput" style="display:none" multiple>
</div>

<script>
// ---- Chat state ----
let chatHistory = [{role:"system", content: CONFIG.CUSTOM_INSTRUCTIONS}];

// ---- Add message ----
function addMessage(text, type){
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "message " + type;
  if(type==="ai"){
    div.innerHTML = marked.parse(text);
    div.querySelectorAll("pre").forEach(pre=>{
      const btn = document.createElement("button");
      btn.textContent = "Copy";
      btn.className = "copy-btn";
      btn.onclick = ()=>navigator.clipboard.writeText(pre.textContent);
      pre.appendChild(btn);
    });
  } else {
    div.textContent = text;
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// ---- Attach Files ----
const fileInput = document.getElementById('fileInput');
document.getElementById('attachBtn').onclick = ()=>fileInput.click();
fileInput.addEventListener('change', e=>{
  Array.from(e.target.files).forEach(f=>{
    addMessage("Attached file: "+f.name, "user");
  });
});

// ---- Send message ----
async function sendMessage(){
  const input = document.getElementById("prompt");
  const message = input.value.trim();
  if(!message) return;
  addMessage(message,"user");
  chatHistory.push({role:"user", content:message});
  input.value = "";

  const model = document.getElementById("modelSelect").value;
  addMessage("Typing...","ai");

  try {
    // **Call backend instead of Mistral API directly**
    const response = await fetch("https://YOUR_BACKEND_URL/chat", { // <- Replace with your backend URL
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: model, messages: chatHistory })
    });

    const data = await response.json();
    const typingMsg = document.querySelector(".ai:last-child");
    if(typingMsg) typingMsg.remove();

    if(data.choices && data.choices[0] && data.choices[0].message){
      const reply = data.choices[0].message.content;
      addMessage(reply,"ai");
      chatHistory.push({role:"assistant", content:reply});
    } else {
      addMessage("No response from backend","ai");
    }

  } catch(err){
    const typingMsg = document.querySelector(".ai:last-child");
    if(typingMsg) typingMsg.remove();
    addMessage("Connection error","ai");
    console.error(err);
  }
}

// ---- Export Chat ----
function exportChat(){
  let text = "Chat Export\n\n";
  chatHistory.forEach(msg=>{
    text += (msg.role==="user"?"User: ":"AI: ") + msg.content + "\n\n";
  });
  const blob = new Blob([text],{type:"text/plain"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download="chat.txt";
  a.click();
}

// ---- Clear Chat ----
function clearChat(){
  document.getElementById("chat").innerHTML="";
  chatHistory = [{role:"system", content: CONFIG.CUSTOM_INSTRUCTIONS}];
}

// ---- Theme toggle ----
document.getElementById("themeBtn").onclick = ()=>{
  document.body.classList.toggle("dark");
}

// ---- Enter key ----
document.getElementById("prompt").addEventListener("keypress", e=>{
  if(e.key==="Enter") sendMessage();
});
</script>

</body>
</html>
